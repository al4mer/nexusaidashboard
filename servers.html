<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI - Servers</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="12" cy="12" r="3" fill="currentColor"/>
                    </svg>
                    <span>NexusAI</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="servers.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <span>Servers</span>
                </a>
                <a href="keys.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5l3 3"/>
                    </svg>
                    <span>API Keys</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <img src="" alt="" class="user-avatar" id="userAvatar">
                    <div class="user-details">
                        <span class="user-name" id="userName">Loading...</span>
                        <span class="user-tag" id="userTag"></span>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn" title="Logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Your Servers</h1>
                <p class="header-subtitle">Select a server to manage NexusAI settings</p>
            </header>

            <div class="servers-grid" id="serversGrid">
                <!-- Server cards will be loaded here -->
            </div>

            <div class="loading-state" id="loadingState" style="display: flex;">
                <div class="spinner"></div>
                <p>Loading servers...</p>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
                <h3>No Servers Found</h3>
                <p>Make sure NexusAI is invited to your servers with administrator permissions.</p>
                <a href="#" class="btn btn-primary" id="inviteBotBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                    Invite NexusAI
                </a>
            </div>

            <div class="error-state" id="errorState" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <h3>Failed to Load Servers</h3>
                <p id="errorMessage">Something went wrong. Please try again.</p>
                <button class="btn btn-primary" onclick="loadServers()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
                    </svg>
                    Retry
                </button>
            </div>
        </main>
    </div>

    <script src="assets/config.js"></script>
    <script src="assets/api.js"></script>
    <script src="assets/auth.js"></script>
    <script>
        // Check authentication
        if (!NexusAuth.isAuthenticated()) {
            window.location.href = 'index.html';
        }

        // Load user info
        async function loadUserInfo() {
            try {
                const user = await NexusAPI.getUser();
                document.getElementById('userName').textContent = user.username;
                document.getElementById('userTag').textContent = `#${user.discriminator || '0000'}`;
                document.getElementById('userAvatar').src = user.avatar
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=32`
                    : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator || '0') % 5}.png`;
            } catch (error) {
                console.error('Failed to load user info:', error);
            }
        }

        // Load servers
        async function loadServers() {
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const errorState = document.getElementById('errorState');
            const serversGrid = document.getElementById('serversGrid');

            loadingState.style.display = 'flex';
            emptyState.style.display = 'none';
            errorState.style.display = 'none';
            serversGrid.innerHTML = '';

            try {
                const servers = await NexusAPI.getGuilds();

                loadingState.style.display = 'none';

                if (servers.length === 0) {
                    emptyState.style.display = 'flex';
                    return;
                }

                serversGrid.innerHTML = servers.map(server => `
                    <div class="server-card" onclick="selectServer('${server.id}')">
                        <div class="server-icon">
                            ${server.icon
                                ? `<img src="https://cdn.discordapp.com/icons/${server.id}/${server.icon}.png?size=64" alt="${server.name}">`
                                : `<div class="server-icon-placeholder">${server.name.charAt(0)}</div>`
                            }
                        </div>
                        <div class="server-info">
                            <h3 class="server-name">${escapeHtml(server.name)}</h3>
                            <div class="server-tags">
                                <span class="tag tag-success">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                        <polyline points="20 6 9 17 4 12"/>
                                    </svg>
                                    NexusAI Active
                                </span>
                                ${server.permissions === 'admin' ? `
                                    <span class="tag tag-info">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                        </svg>
                                        Administrator
                                    </span>
                                ` : ''}
                                </div>
                        </div>
                        <button class="btn btn-primary server-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                            Open Dashboard
                        </button>
                    </div>
                `).join('');

            } catch (error) {
                loadingState.style.display = 'none';
                errorState.style.display = 'flex';
                document.getElementById('errorMessage').textContent = error.message || 'Something went wrong. Please try again.';
            }
        }

        // Select server and navigate to dashboard
        function selectServer(serverId) {
            sessionStorage.setItem('selectedServerId', serverId);
            window.location.href = 'dashboard.html';
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        document.getElementById('logoutBtn').addEventListener('click', () => {
            NexusAuth.logout();
            window.location.href = 'index.html';
        });

        // Initialize
        loadUserInfo();
        loadServers();
    </script>
</body>
</html>
